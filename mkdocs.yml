site_name: HilbertBench
site_description: Non-intrusive diagnostic framework for quantum machine learning
site_author: HilbertBench Contributors
site_url: https://mamuncseru.github.io/hilbertbench/
repo_url: https://github.com/mamuncseru/hilbertbench
repo_name: mamuncseru/hilbertbench

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

plugins:
  - search

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - Overview: tutorials/index.md
    - "01 · Why Isn't My VQE Converging?": tutorials/vqe-barren-plateau.md
    - "02 · Am I Using Enough Shots?": tutorials/shot-noise.md
  - Concepts: concepts.md
  - Guides:
    - Qiskit Estimator (VQE): guides/qiskit-estimator.md
    - Qiskit Sampler (QAOA): guides/qiskit-sampler.md
    - IBM Hardware: guides/ibm-hardware.md
    - PennyLane QNN: guides/pennylane-qnn.md
    - Active Mode (Expressibility): guides/active-mode.md
  - Analyzers:
    - Barren Plateau: analyzers/barren-plateau.md
    - Shot Noise Ratio: analyzers/shot-noise.md
    - Optimization Convergence: analyzers/optimization.md
    - Circuit Structure: analyzers/circuit-structure.md
    - Expressibility (KL): analyzers/expressibility.md
    - Noise Profile: analyzers/noise-profile.md
  - Reference:
    - Invariants: reference/invariants.md
    - Trace Format: reference/trace-format.md
